# ═══════════════════════════════════════════════════════════════════════════
#  WFX 最简反向代理配置 (HTTP only, 零依赖, 保证能跑起来)
#  目的: 让 nginx 把所有请求转发给 python server.py (127.0.0.1:8000)
#  这是修复"导航404 + quote报错"的核心 —— 当前 nginx 是静态模式, 改成反代即可。
#
#  用法 (云服务器上):
#    1. 上传此文件到 /etc/nginx/conf.d/wanfuxin-dg.com.conf
#    2. 删除/禁用旧的静态配置 (见下方说明)
#    3. sudo nginx -t        (测试语法)
#    4. sudo systemctl reload nginx
#
#  ⚠ 这是临时 HTTP 版, 先让网站通。HTTPS/限流/Brotli 等以后再加
#    (用 deploy/nginx-wanfuxin.conf 那个完整版)。
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name wanfuxin-dg.com www.wanfuxin-dg.com;

    # CAD 文件上传可达 100MB —— 必须放大, 否则大文件 quote 提交会失败
    client_max_body_size 100M;

    # 反代超时 (大文件上传/慢请求留足时间)
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── 核心: 所有请求都转给 python server.py ──────────────────────────────
    # 不要用 root / try_files —— 让 python 处理一切 (静态页 + /api/ + /admin/)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
}
