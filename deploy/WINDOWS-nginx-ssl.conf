
#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # CAD file uploads can be up to 100MB
    client_max_body_size 100M;

    # ── HTTP (80): 自动跳转到 HTTPS ─────────────────────────────────────────
    server {
        listen       80;
        server_name  wanfuxin-dg.com www.wanfuxin-dg.com;

        # 所有 http 请求 301 永久跳转到 https
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (443): SSL + 反向代理给 python ────────────────────────────────
    server {
        listen       443 ssl;
        server_name  wanfuxin-dg.com www.wanfuxin-dg.com;

        # ⚠ 证书路径 —— 改成你实际放证书的位置!
        #   注意 Windows 路径在 nginx 里要用正斜杠 / 不是反斜杠 \
        ssl_certificate      C:/nginx/nginx-1.24.0/ssl/wanfuxin-dg.crt;
        ssl_certificate_key  C:/nginx/nginx-1.24.0/ssl/wanfuxin-dg.key;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── 核心: 所有请求转发给 python server.py (127.0.0.1:8000) ──────────
        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }
}
