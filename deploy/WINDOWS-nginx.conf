
#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # CAD file uploads can be up to 100MB
    client_max_body_size 100M;

    server {
        listen       80;
        server_name  wanfuxin-dg.com www.wanfuxin-dg.com;

        # ── 核心修复 ──────────────────────────────────────────────────────
        # 把所有请求转发给 python server.py (127.0.0.1:8000)。
        # 不要用 root/index —— 让 python 处理一切(静态页 + /api/ + /admin/)。
        # 这就是"导航404"的修复:之前 nginx 当静态服务器只找得到 index.html,
        # 现在改成反代,python 负责所有页面和接口。
        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }
}
