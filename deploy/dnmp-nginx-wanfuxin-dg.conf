# ─── DNMP nginx vhost for wanfuxin-dg.com ───────────────────────────────────
# Place this file in DNMP's nginx config folder. For most DNMP installs that's:
#     dnmp/services/nginx/conf.d/wanfuxin-dg.com.conf
# (some versions use dnmp/conf/conf.d/ — check where the sample .conf files are)
#
# Then reload nginx:  docker compose exec nginx nginx -s reload
#                     (run from the dnmp folder)
#
# This config does NOT use PHP. It reverse-proxies ALL traffic to the WFX
# Python backend container (wfx-backend:8000). DNMP's nginx is just the front
# door + TLS terminator; server.py does the actual work.

server {
    listen 80;
    server_name wanfuxin-dg.com www.wanfuxin-dg.com;

    # After you get an HTTPS cert (certbot), uncomment to force HTTPS:
    # return 301 https://$host$request_uri;

    client_max_body_size 60M;   # allow large CAD file uploads

    location / {
        proxy_pass http://wfx-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

