# ==============================================================================
# WFX Wanfuxin — Nginx Reverse Proxy Configuration
# ==============================================================================
# Place this in /etc/nginx/sites-available/wanfuxin.com and symlink to
# /etc/nginx/sites-enabled/, then run: sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Cloud server with Nginx installed
#   - Domain pointing to server IP (A record)
#   - SSL cert via Let's Encrypt: sudo certbot --nginx -d wanfuxin.com -d www.wanfuxin.com
#   - WFX server running on 127.0.0.1:8000 (managed by systemd)
# ==============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name wanfuxin.com www.wanfuxin.com;
    return 301 https://wanfuxin.com$request_uri;
}

# HTTPS canonical (force www → no-www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.wanfuxin.com;

    ssl_certificate     /etc/letsencrypt/live/wanfuxin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanfuxin.com/privkey.pem;

    return 301 https://wanfuxin.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wanfuxin.com;

    # ── SSL configuration ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/wanfuxin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanfuxin.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── Security headers (defense-in-depth on top of server.py) ─────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide Nginx version
    server_tokens off;

    # ── Body size limits ────────────────────────────────────────────────────
    client_max_body_size 110M;        # 100MB CAD upload + headroom
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ── Gzip (Nginx-level, in addition to server.py's gzip) ─────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/xml
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Brotli (if module installed) ────────────────────────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types
    #     application/javascript application/json application/xml
    #     image/svg+xml text/css text/html text/plain;

    # ──────────────────────────────────────────────────────────────────────────
    # ANTI-SCRAPING & RATE LIMITING (active)
    # ──────────────────────────────────────────────────────────────────────────
    # PREREQUISITE: add the following to /etc/nginx/nginx.conf inside http{}
    # block (NOT here — these directives must be at http{} scope, not server{}):
    #
    #   # Rate-limit zones — 10m shared memory ≈ 160,000 IPs tracked
    #   limit_req_zone $binary_remote_addr zone=wfx_general:10m  rate=5r/s;
    #   limit_req_zone $binary_remote_addr zone=wfx_api:10m      rate=10r/s;
    #   limit_req_zone $binary_remote_addr zone=wfx_login:10m    rate=2r/s;
    #   limit_req_zone $binary_remote_addr zone=wfx_form:10m     rate=1r/s;
    #
    #   # Connection limits
    #   limit_conn_zone $binary_remote_addr zone=wfx_conn:10m;
    #
    #   # Map suspicious UAs to a flag variable used below
    #   map $http_user_agent $is_blocked_ua {
    #       default                  0;
    #       ""                       1;
    #       ~*scrapy                 1;
    #       ~*python-requests        1;
    #       ~*python-urllib          1;
    #       ~*wget                   1;
    #       ~*curl/                  1;
    #       ~*httpclient             1;
    #       ~*httpie                 1;
    #       ~*libwww-perl            1;
    #       ~*phantomjs              1;
    #       ~*headlesschrome         1;
    #       ~*puppeteer              1;
    #       ~*playwright             1;
    #       ~*selenium               1;
    #       ~*httrack                1;
    #       ~*sitescraper            1;
    #       ~*mj12bot                1;
    #       ~*dotbot                 1;
    #       ~*petalbot               1;
    #       ~*go-http-client         1;
    #   }
    #   # NOTE: 'java' is intentionally NOT in this list — Apache HttpClient
    #   # (which Java applications use to talk to APIs) sends UAs containing
    #   # 'Java/<version>' and many B2B integrations rely on it. Blocking
    #   # 'java' would cut off legitimate enterprise customers.

    # Bot UA hard-block (HTML pages and forms only; assets pass through)
    if ($is_blocked_ua = 1) {
        return 403;
    }

    # Cap concurrent connections per IP (prevents Slowloris + parallel scrapers)
    limit_conn wfx_conn 20;

    # ── Block sensitive files ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ \.(py|sh|sql|md|env|bak|backup|swp|orig|save|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block direct access to sensitive paths ──────────────────────────────
    location = /server.py     { return 404; }
    location = /schema.sql    { return 404; }
    location = /config.py     { return 404; }
    location ~ ^/uploads/\.   { return 404; }   # Hide /uploads/.auth/
    location ^~ /uploads/.auth/ { return 404; }
    location ^~ /uploads/quotes/ { return 404; }  # Customer CAD files

    # Block WordPress probe traffic (we don't use WP, so any hit = scanner)
    # 99% of bot traffic on a new site is WP enumeration. Returning 444
    # (Nginx-specific "close without response") makes the bot waste time waiting.
    location ~ ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
        access_log off;
    }
    # PHPMyAdmin / phpinfo / common scanner paths
    location ~ ^/(phpmyadmin|pma|admin\.php|setup\.php|phpinfo\.php|\.git|\.svn|\.env\.bak|backup\.zip) {
        return 444;
        access_log off;
    }

    # ── Admin path (extra protection) ───────────────────────────────────────
    location /admin/ {
        # Option A: IP allowlist (RECOMMENDED for production)
        # Uncomment and replace with your office's static IPs:
        # allow 203.0.113.45;          # Lu's office
        # allow 198.51.100.0/24;       # WFX office subnet
        # deny all;

        # Option B: HTTP Basic Auth on top of app-level auth (recommended)
        # Generate: sudo htpasswd -c /etc/nginx/.htpasswd-wfx admin
        # auth_basic "WFX Admin — additional authentication required";
        # auth_basic_user_file /etc/nginx/.htpasswd-wfx;

        # Always: prevent search indexing at the proxy level
        add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

        # Throttle login attempts to 2/sec, queue up to 5
        limit_req zone=wfx_login burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # If you're behind Cloudflare, the real client IP is in CF-Connecting-IP.
        # See deploy/CLOUDFLARE.md for the full set_real_ip_from directives.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API endpoints (rate-limited separately) ─────────────────────────────
    location ~ ^/api/(quote|contact)$ {
        # Form submissions: 1/sec, allow brief burst
        limit_req zone=wfx_form burst=3 nodelay;
        client_max_body_size 110M;   # accommodate large CAD uploads
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/auth/login$ {
        limit_req zone=wfx_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location ~ ^/api/ {
        limit_req zone=wfx_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes ──────────────────────────────────────────────────────────
    location /api/ {
        # limit_req zone=wfx_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;          # Allow slow uploads/processing
        proxy_request_buffering off;       # Stream large CAD uploads
    }

    # ── Static assets with aggressive caching ───────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|otf|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Default: pass to app server ─────────────────────────────────────────
    location / {
        # General page traffic: 5 req/sec sustained, burst up to 20 (allow brief
        # bursts for users opening multiple tabs). Bots hammering 50+/sec get 503.
        limit_req zone=wfx_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ── Robots.txt and sitemap.xml served directly ──────────────────────────
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/wanfuxin.access.log;
    error_log  /var/log/nginx/wanfuxin.error.log warn;
}
