<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - WFX Admin</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .password-card {
            max-width: 520px;
            margin: 40px auto;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
        }
        .password-card h2 {
            margin: 0 0 8px;
            font-size: 1.6rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .password-card h2 i { color: var(--primary); }
        .password-card .subtitle {
            color: var(--gray);
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: var(--primary);
            outline: 2px solid rgba(0, 82, 204, 0.15);
        }
        .password-meter {
            height: 4px;
            background: var(--light-gray);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-meter-bar {
            height: 100%;
            width: 0;
            background: #ef4444;
            transition: width 0.2s, background 0.2s;
        }
        .password-meter-bar.weak    { background: #ef4444; width: 25%; }
        .password-meter-bar.fair    { background: #f59e0b; width: 50%; }
        .password-meter-bar.good    { background: #3b82f6; width: 75%; }
        .password-meter-bar.strong  { background: #16a34a; width: 100%; }
        .password-hints {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: 6px;
        }
        .password-hints.fail { color: #ef4444; }
        .alert {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alert.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .alert.warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; display: block; }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary:hover { background: var(--primary-dark, #0040a0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="admin-body">
    <main style="min-height: 100vh; background: var(--off-white); padding: 40px 20px;">
        <div class="password-card">
            <h2><i class="fas fa-key" aria-hidden="true"></i> Change Password</h2>
            <p class="subtitle">Update your administrator password.</p>

            <div id="must-change-warning" class="alert warning">
                <strong>Action required:</strong> You're using the default password. For security, you must change it before continuing.
            </div>

            <div id="alert-success" class="alert success"></div>
            <div id="alert-error" class="alert error"></div>

            <form id="password-form">
                <div class="form-group">
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" autocomplete="current-password" required>
                </div>

                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" autocomplete="new-password" minlength="8" required>
                    <div class="password-meter"><div id="password-meter-bar" class="password-meter-bar"></div></div>
                    <div id="password-hints" class="password-hints">Use 8+ characters with a mix of letters, numbers, and symbols.</div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" autocomplete="new-password" required>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    <i class="fas fa-save" aria-hidden="true"></i> Update Password
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px;">
                <a href="dashboard.html" id="back-link" style="color: var(--gray); text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i> Back to Dashboard
                </a>
            </p>
        </div>
    </main>

    <script src="js/cms-sync.js?v=20260609c"></script>
    <script src="js/admin-core.js?v=20260609d"></script>
    <script>
        // Verify the user is logged in
        AdminCore.checkAuth();

        // Show "must change" warning if applicable
        const mustChange = sessionStorage.getItem('wfx_must_change_password') === '1';
        document.getElementById('must-change-warning').style.display = mustChange ? 'block' : 'none';
        if (mustChange) {
            // Hide the back link when forced
            document.getElementById('back-link').style.display = 'none';
        }

        // Password strength meter
        const newInput = document.getElementById('new-password');
        const meter = document.getElementById('password-meter-bar');
        const hints = document.getElementById('password-hints');

        function scorePassword(pw) {
            let score = 0;
            if (pw.length >= 8)  score++;
            if (pw.length >= 12) score++;
            if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw))   score++;
            if (/[^a-zA-Z0-9]/.test(pw)) score++;
            return score;
        }

        newInput.addEventListener('input', function() {
            const s = scorePassword(this.value);
            meter.className = 'password-meter-bar';
            if (this.value.length === 0) return;
            if (s <= 1) meter.classList.add('weak');
            else if (s === 2) meter.classList.add('fair');
            else if (s === 3) meter.classList.add('good');
            else meter.classList.add('strong');
        });

        document.getElementById('password-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const current = document.getElementById('current-password').value;
            const newPw = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const successAlert = document.getElementById('alert-success');
            const errorAlert = document.getElementById('alert-error');
            const submitBtn = document.getElementById('submit-btn');

            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';

            if (newPw.length < 8) {
                errorAlert.textContent = 'New password must be at least 8 characters long.';
                errorAlert.style.display = 'block';
                return;
            }
            if (newPw !== confirm) {
                errorAlert.textContent = 'New password and confirmation do not match.';
                errorAlert.style.display = 'block';
                return;
            }
            if (newPw === current) {
                errorAlert.textContent = 'New password must be different from your current password.';
                errorAlert.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Updating...';

            try {
                const csrf = window.WFX_CSRF_TOKEN || localStorage.getItem('wfx_csrf_token') || '';
                const r = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': csrf,
                    },
                    body: JSON.stringify({
                        current_password: current,
                        new_password: newPw,
                    })
                });
                const j = await r.json().catch(() => ({}));

                if (r.ok && j.ok) {
                    successAlert.textContent = 'Password updated successfully. Redirecting...';
                    successAlert.style.display = 'block';
                    sessionStorage.removeItem('wfx_must_change_password');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    errorAlert.textContent = j.error || 'Failed to update password. Please try again.';
                    errorAlert.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save" aria-hidden="true"></i> Update Password';
                }
            } catch (err) {
                errorAlert.textContent = 'Server unreachable. Cannot update password without server connection.';
                errorAlert.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save" aria-hidden="true"></i> Update Password';
            }
        });
    </script>
</body>
</html>
