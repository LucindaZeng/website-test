<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | WFX CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-header img {
            height: 50px;
            margin-bottom: 20px;
        }
        .login-header h1 {
            font-size: 1.5rem;
            color: #1a2942;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6b7280;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0052cc;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0052cc 0%, #0747a6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,82,204,0.3);
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .back-link {
            text-align: center;
            margin-top: 25px;
        }
        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover {
            color: #0052cc;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="../logo.png" alt="WFX">
            <h1>Admin Panel</h1>
            <p>Sign in to manage your website</p>
        </div>
        
        <div class="error-message" id="error-message">
            Invalid username or password
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt" aria-hidden="true"></i> Sign In
            </button>
        </form>
        
        <div class="back-link">
            <a href="../index.html"><i class="fas fa-arrow-left" aria-hidden="true"></i> Back to Website</a>
        </div>
    </div>

    <script src="js/cms-sync.js"></script>
    <script src="js/admin-core.js"></script>
    <script>
        // If already logged in (server session OR local fallback), redirect
        (async function checkExistingSession() {
            try {
                const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (r.ok) {
                    const j = await r.json();
                    if (j.ok) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                }
            } catch (e) { /* server unreachable — user must retry, no client-side fallback */ }
            // Intentionally NO localStorage fallback. The server is the sole
            // source of truth for authentication. If the server is unreachable,
            // the user must fix that — we won't silently let them in based on
            // a stale localStorage flag.
        })();

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            // Server-side authentication is the ONLY accepted path.
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const j = await r.json().catch(() => ({}));
                if (r.ok && j.ok) {
                    // Store CSRF token so cms-sync.js can include it on writes
                    if (j.csrf_token) {
                        localStorage.setItem('wfx_csrf_token', j.csrf_token);
                        window.WFX_CSRF_TOKEN = j.csrf_token;
                    }
                    // Mirror user profile to localStorage so the admin UI shell
                    // (sidebar name, role badges) can render without an extra
                    // round-trip. NOTE: this is profile data ONLY, not an auth
                    // flag — the real session lives in the HttpOnly cookie.
                    localStorage.setItem('wfx_admin_logged_in', 'true');
                    localStorage.setItem('wfx_admin_user', JSON.stringify({
                        id: j.user.id,
                        username: j.user.username,
                        role: j.user.role,
                        name: j.user.username,
                    }));

                    // If server reports password is still default, force change
                    if (j.user.must_change_password) {
                        sessionStorage.setItem('wfx_must_change_password', '1');
                        AdminCore.logAction('login', 'User logged in (password change required)', { username });
                        window.location.href = 'change-password.html';
                        return;
                    }
                    AdminCore.logAction('login', 'User logged in', { username });
                    window.location.href = 'dashboard.html';
                    return;
                }
                if (r.status === 429) {
                    errorMsg.textContent = 'Too many login attempts. Try again in 5 minutes.';
                } else {
                    errorMsg.textContent = j.error || 'Invalid username or password';
                }
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
            } catch (err) {
                errorMsg.textContent = 'Server unreachable. Check your connection and try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
